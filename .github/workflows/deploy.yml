name: CI/CD Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd client
          npm install

      - name: Build frontend
        run: |
          cd client
          npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Enable required Google APIs
        run: |
          gcloud services enable run.googleapis.com cloudbuild.googleapis.com firebase.googleapis.com --project mid-wifi

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker --quiet

      - name: Build and push backend container
        run: |
          docker build -t gcr.io/mid-wifi/midwifery-backend ./server
          docker push gcr.io/mid-wifi/midwifery-backend

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy midwifery-backend \
            --image gcr.io/mid-wifi/midwifery-backend \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "MONGODB_URI=${{ secrets.MONGODB_URI }},SESSION_SECRET=${{ secrets.SESSION_SECRET }},CLIENT_URL=https://mid-wifi.web.app"

      - name: Deploy frontend to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: mid-wifi
