apiVersion: apps/v1
kind: Deployment
metadata:
    name: server
    namespace: midwifi
    labels:
        com.docker.compose.project: midwifi
        com.docker.compose.service: server
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: midwifi
            com.docker.compose.service: server
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                com.docker.compose.project: midwifi
                com.docker.compose.service: server
                com.docker.compose.network.default: "true"
