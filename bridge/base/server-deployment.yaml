                      value: "MidWifi123!"
                    - name: CLIENT_URL
                      value: "http://localhost:3000"
                    - name: MONGODB_URI
                      value: "mongodb://admin:password@mongo:27017/admin"
                    - name: SESSION_SECRET
                      value: "your-session-secret"
                  ports:
                    - name: server-4000
                      containerPort: 4000
