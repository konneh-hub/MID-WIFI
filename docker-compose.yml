services:
  mongo:
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build: ./server
    ports:
      - "4000:4000"
    environment:
      - MONGODB_URI=mongodb://admin:password@mongo:27017/admin
      - SESSION_SECRET=your-session-secret
      - CLIENT_URL=http://localhost:3000
      - ADMIN_EMAIL=admin@midwifi.edu
      - ADMIN_PASSWORD=MidWifi123!
    depends_on:
      - mongo

  client:
    build: ./client
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE=http://server:4000/api
    depends_on:
      - server

volumes:
  mongo_data: